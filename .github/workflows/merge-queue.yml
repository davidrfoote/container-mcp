name: Merge Queue Validation

on:
  merge_group:

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Run integration tests
        run: chmod +x integration_tests.sh && ./integration_tests.sh
